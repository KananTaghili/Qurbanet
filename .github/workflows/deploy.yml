name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub Actions serverinə kodlarımızı çəkirik
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. GitHub serverində Node.js mühitini qururuq
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Sizin istifadə etdiyiniz Node versiyası (məsələn: 18, 20 və s.)
          cache: "npm"

      # 3. GitHub serverində paketləri yazırıq və layihəni BUILD edirik
      - name: Install Dependencies and Build Next.js
        run: |
          npm install
          npm run build

      # 4. Hazır olan layihə fayllarını rsync/scp ilə sizin serverə göndəririk
      - name: Copy Build Files to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} # və ya secrets.SSH_PRIVATE_KEY
          # Serverə yüklənəcək vacib Next.js faylları:
          source: ".next/,public/,package.json,package-lock.json,next.config.js"
          target: "/var/www/qurbanetfront"
          rm: false

      # 5. Sizin serverə qoşulub sadəcə PM2-ni restart edirik
      - name: Executing remote SSH commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            set -e

            cd /var/www/qurbanetfront

            # Serverdə yalnız production paketlərini sürətli yeniləyirik
            npm install --production

            # PM2 ilə frontend-i restart edirik
            pm2 restart qurbanetfrontpm || pm2 start npm --name "qurbanetfrontpm" -- run start
            pm2 save
