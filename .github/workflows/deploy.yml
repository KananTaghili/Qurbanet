name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies and Build Next.js
        env:
          NEXT_PUBLIC_API_URL: https://api.qurbanet.az/api
        run: |
          npm ci
          npm run build

      - name: Copy Build Files to Server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ".next,public,package.json,package-lock.json,next.config.js"
          target: "/var/www/qurbanetfront"
          rm: false

      - name: Restart App on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            set -e
            cd /var/www/qurbanetfront
            [ -d .next ] || { echo "ERROR: .next folder missing after SCP!"; exit 1; }
            npm ci --omit=dev
            pm2 restart qurbanetfrontpm || pm2 start npm --name "qurbanetfrontpm" -- run start
            pm2 save
