name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install, Build & Package
        env:
          NEXT_PUBLIC_API_URL: https://api.qurbanet.az/api
        run: |
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Upload archive to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy.tar.gz"
          target: "/var/www/qurbanetfront"

      - name: Extract & Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            set -e

            cd /var/www/qurbanetfront
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            [ -f server.js ] || { echo "ERROR: server.js not found!"; exit 1; }

            PORT=443 pm2 restart qurbanetfrontpm --update-env \
              || PORT=443 pm2 start server.js --name "qurbanetfrontpm"
            pm2 save
