name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & Build
        env:
          NEXT_PUBLIC_API_URL: https://api.qurbanet.az/api
        run: |
          npm ci
          npm run build
          # Standalone build-in yanına static və public faylları əlavə et
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Upload standalone build to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: ".next/standalone/."
          target: "/var/www/qurbanetfront"
          rm: false

      - name: Restart App on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            set -e

            [ -f /var/www/qurbanetfront/server.js ] || { echo "ERROR: server.js not found!"; exit 1; }

            PORT=3001 pm2 restart qurbanetfrontpm --update-env \
              || PORT=3001 pm2 start /var/www/qurbanetfront/server.js --name "qurbanetfrontpm"
            pm2 save
