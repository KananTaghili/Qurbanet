name: Deploy FrontendDEV

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Executing remote SSH commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            set -e 
            
            cd /var/www/qurbanetfront-dev
            
            # Kodları GitHub-dan çəkirik (server-dəki local dəyişiklikləri ləğv edib təmiz çəkirik)
            git fetch origin dev
            git reset --hard origin/dev
            
            # Paketləri yeniləyirik
            npm install
            
            # Next.js production build edirik (Kritik addım)
            npm run build
            
            # PM2 ilə tətbiqi sıfır itki ilə (zero-downtime) restart edirik
            PORT=3001 pm2 restart qurbanetfrontpm-dev --update-env
            pm2 save
            
            echo "🚀 Frontend DEV mühiti 100% uğurla yeniləndi!"